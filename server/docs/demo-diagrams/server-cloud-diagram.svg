<svg width="900" height="860" viewBox="0 0 900 860" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-teal" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-amber" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#BA7517" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#185FA5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <marker id="arrow-coral" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#993C1D" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="900" height="860" fill="#ffffff"/>

<!-- ═══════════════════════════════════════════
     CENTER SPINE: x=450
     Layout:
       Row 1  y=80   Clients (ellipse)
       Row 2  y=190  Load Balancer (diamond)
       Row 3  y=310  Orchestrator Cluster (wide box)
       Row 4  y=430  Submission Queue (pill) — RIGHT of center
       Row 5  y=540  Sessions Manager Cluster (wide box, right-aligned)
       Row 6  y=660  Compute Queue (pill, right) | Game Compute Cluster (center-left) | Completion Queue (pill, left)
     ═══════════════════════════════════════════ -->

<!-- Title -->
<text x="450" y="40" text-anchor="middle" font-size="18" font-weight="600" fill="#1a1a1a">Game Server Cloud Architecture</text>

<!-- ── ROW 1: CLIENTS — centered x=450 ── -->
<ellipse cx="450" cy="90" rx="100" ry="36" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
<text x="450" y="90" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="500" fill="#3C3489">Clients</text>

<!-- Arrow: Clients ↔ Load Balancer -->
<line x1="450" y1="126" x2="450" y2="168" stroke="#7F77DD" stroke-width="1.5" marker-start="url(#arrow-purple)" marker-end="url(#arrow-purple)"/>

<!-- ── ROW 2: LOAD BALANCER diamond — centered x=450, center-y=210 ── -->
<!-- half-w=80 half-h=44: top=166 bottom=254 left=370 right=530 -->
<polygon points="450,166 530,210 450,254 370,210" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="450" y="210" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="500" fill="#2C2C2A">Load balancer</text>

<!-- Arrow: Load Balancer ↔ Orchestrator -->
<line x1="450" y1="254" x2="450" y2="296" stroke="#888" stroke-width="1.5" marker-start="url(#arrow)" marker-end="url(#arrow)"/>

<!-- ── ROW 3: ORCHESTRATOR CLUSTER — centered x=450, w=380 h=72: x=260 right=640 ── -->
<rect x="260" y="298" width="380" height="72" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="450" y="326" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="500" fill="#085041">Orchestrator cluster</text>
<text x="450" y="350" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Receives, routes and tracks requests</text>

<!-- Arrow: Orchestrator right edge → Submission Queue left edge -->
<!-- Orchestrator right=640, Sub Queue left=680, gap=40 -->
<line x1="640" y1="334" x2="678" y2="334" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow-teal)"/>

<!-- ── ROW 4: SUBMISSION QUEUE pill — center x=740, w=120 h=80: x=680 right=800, y=294 ── -->
<rect x="680" y="294" width="120" height="80" rx="40" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text x="740" y="326" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Submission</text>
<text x="740" y="346" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">queue</text>

<!-- Arrow: Submission Queue bottom → Sessions Manager top (x=740) -->
<line x1="740" y1="374" x2="740" y2="418" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

<!-- ── ROW 5: SESSIONS MANAGER CLUSTER — center x=740, w=300 h=72: x=590 right=890, y=420 ── -->
<rect x="590" y="420" width="300" height="72" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="740" y="456" text-anchor="middle" dominant-baseline="central" font-size="15" font-weight="500" fill="#0C447C">Sessions manager cluster</text>

<!-- Arrow: Sessions Manager bottom → Compute Queue top (x=740) -->
<line x1="740" y1="492" x2="740" y2="540" stroke="#185FA5" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

<!-- ── ROW 6 RIGHT: COMPUTE QUEUE pill — center x=740, w=120 h=80: x=680 right=800, y=542 ── -->
<rect x="680" y="542" width="120" height="80" rx="40" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text x="740" y="574" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Compute</text>
<text x="740" y="594" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">queue</text>

<!-- Arrow: Compute Queue left → Game Compute Cluster right -->
<line x1="680" y1="582" x2="566" y2="582" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

<!-- ── ROW 6 CENTER: GAME COMPUTE CLUSTER — center x=370, w=340 h=72: x=200 right=540, y=546 ── -->
<rect x="200" y="546" width="340" height="72" rx="12" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="370" y="574" text-anchor="middle" dominant-baseline="central" font-size="16" font-weight="500" fill="#4A1B0C">Game compute cluster</text>
<text x="370" y="596" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">Processes game logic</text>

<!-- Arrow: Game Compute Cluster left → Completion Queue right -->
<line x1="200" y1="582" x2="142" y2="582" stroke="#993C1D" stroke-width="1.5" marker-end="url(#arrow-coral)"/>

<!-- ── ROW 6 LEFT: COMPLETION QUEUE pill — center x=80, w=120 h=80: x=20 right=140, y=542 ── -->
<rect x="20" y="542" width="120" height="80" rx="40" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.5"/>
<text x="80" y="574" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Completion</text>
<text x="80" y="594" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">queue</text>

<!-- Arrow: Completion Queue top → up → Orchestrator left edge -->
<path d="M80 542 L80 334 L260 334" fill="none" stroke="#BA7517" stroke-width="1.5" marker-end="url(#arrow-amber)"/>

</svg>
